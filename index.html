function s(cls,text){return{cls,text};}

function linkify(text){
  const urlRe=/(https?:\/\/[^\s]+|(?:github|linkedin|x)\.com\/[^\s]+)/g;
  let result='',last=0,m;
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  while((m=urlRe.exec(text))!==null){
    result+=esc(text.slice(last,m.index));
    const raw=m[0];
    const href=(raw.startsWith('http')?raw:'https://'+raw).replace(/"/g,'%22');
    result+=`<a href="${href}" target="_blank" rel="noopener noreferrer">${esc(raw)}</a>`;
    last=m.index+raw.length;
  }
  result+=esc(text.slice(last));
  return result;
}

function printLines(lines,cb){
  let i=0;
  function next(){
    if(i>=lines.length){cb&&cb();return;}
    const l=lines[i++];
    const div=document.createElement('div');
    div.className='line '+(l.cls||'out');
    if(l.cls==='addr'){div.innerHTML=linkify(l.text);}
    else{div.textContent=l.text;}
    screen.appendChild(div);
    screen.scrollTop=screen.scrollHeight;
    setTimeout(next,16);
  }
  next();
}

    s(p.signed?'ok':'warn',`  authenticode    ${p.signed?'signed (valid)':'NOT signed'}`),
    s('out',''),
    s('out','  sections:'),
    s('dim','  name       VA         size      entropy  flags'),
    s('dim','  ─────────────────────────────────────────────────'),
    ...m.sections.map(sec=>{
      const hi=parseFloat(sec.entropy)>7.0?'warn':parseFloat(sec.entropy)>6.0?'hex':'out';
      return s(hi,`  ${sec.name.padEnd(10)} ${sec.va.padEnd(11)} ${sec.size.padEnd(10)} ${sec.entropy.padEnd(8)} ${sec.flags}`);
    }),
    s('dim','  ─────────────────────────────────────────────────'),
    s(p.signed?'ok':'err',`  verdict: ${p.signed?'signed binary — verify certificate chain':'unsigned binary'}`),
  ];
}

function cmdEntropy(name){
  const m=getSample(name);
  if(!m) return [s('err',`  error: '${name}' not found.`)];
  const lines=[
    s('hi' ,`  [+] entropy analysis: ${name}`),
    s('dim','  ────────────────────────────────────────────────────'),
    s('out','  scale: 0.0 (plain text) ──────────────── 8.0 (encrypted)'),
    s('out',''),
  ];
  m.sections.forEach(sec=>{
    const val=parseFloat(sec.entropy);
    const filled=Math.round(val/8*24);
    const bar='█'.repeat(filled)+'░'.repeat(24-filled);
    const color=val>7.5?'err':val>6.5?'warn':val>5?'hex':'ok';
    lines.push(s(color,`  ${sec.name.padEnd(8)}  [${bar}]  ${sec.entropy}  ${sec.flags}`));
  });
  const overall=parseFloat(m.entropy);
  lines.push(s('out',''));
  if(overall>7.5) lines.push(s('err','  [!] HIGH ENTROPY — strongly suggests encryption or packing'));
  else if(overall>6.5) lines.push(s('warn','  [!] ELEVATED ENTROPY — possible packer or obfuscation'));
  else lines.push(s('ok','  [+] NORMAL ENTROPY — likely unpacked binary'));
  lines.push(s('out',`  overall: ${m.entropy}`));
  return lines;
}

    ],
    'ransom_cl0p.bin':[
      s('dim','  ; encryption loop core'),
      s('addr','  0x004080A0'),s('hex','  push   PROV_RSA_AES'),
      s('addr','  0x004080A5'),s('hex','  call   CryptAcquireContextA'),
      s('addr','  0x004080AA'),s('hex','  push   CALG_AES_256'),
      s('addr','  0x004080AF'),s('hex','  call   CryptGenKey'),
      s('addr','  0x004080B4'),s('hex','  call   enumerate_and_encrypt'),
      s('addr','  0x004080B9'),s('hex','  call   vssadmin_delete_shadows'),
      s('addr','  0x004080BE'),s('hex','  push   offset ".cl0p_readme"'),
      s('addr','  0x004080C3'),s('hex','  call   drop_ransom_note'),
      s('warn','  ; T1486 · T1490'),
    ],
    'njrat.exe':[
      s('dim','  ; .NET managed entry — C2 connect loop'),
      s('addr','  IL_0000'),s('hex','  ldstr  "185.220.101.55"'),
      s('addr','  IL_0005'),s('hex','  ldc.i4 5552'),
      s('addr','  IL_000A'),s('hex','  newobj TcpClient::.ctor(string, int32)'),

  return [s('hi',`  [+] disassembly: ${name}`),s('out',''),...(snippets[name]||[s('err','  no disasm available')]),s('dim','  ...')];
}

function cmdYara(name){
  const m=getSample(name);
  if(!m) return [s('err',`  error: '${name}' not found.`)];
  return [
    s('hi' ,`  [+] YARA rule: ${m.yara}`),s('out',''),
    s('ok' ,`  rule ${m.yara} {`),
    s('ok' ,'    meta:'),
    s('hex',`      author   = "Yoginder Kumar"`),
    s('hex',`      family   = "${m.family}"`),
    s('hex',`      hash     = "${m.hash}"`),
    s('hex',`      date     = "2025"`),
    s('ok' ,'    strings:'),
    ...m.strings.slice(0,3).map((st,i)=>s('hex',`      $s${i} = "${st}" ascii wide nocase`)),
    ...m.imports.slice(0,2).map((im,i)=>s('addr',`      $api${i} = "${im}"`)),
    s('ok' ,'    condition:'),
    s('warn','      uint16(0) == 0x5A4D and'),
    s('warn','      filesize < 5MB and'),
    s('warn','      2 of ($s*) and'),
    s('warn','      1 of ($api*)'),
    s('ok' ,'  }'),s('out',''),
    s('dim','  [*] tune FP threshold · test against clean corpus before production'),
  ];
}

function cmdC2(name){
  const m=getSample(name);
  if(!m) return [s('err',`  error: '${name}' not found.`)];
  return [
    s('hi' ,`  [+] C2 analysis: ${name}`),
    s('dim','  ────────────────────────────────────────────────────'),
    s('warn',`  endpoint     ${m.c2}`),
    s('out', `  protocol     ${m.proto}`),
    s('out', `  beacon       ${m.beacon}`),
    s('err', `  exfil        ${m.exfil}`),
    s('dim','  ────────────────────────────────────────────────────'),
    s('ok' ,'  recommended actions:'),
    s('out','    1. block C2 IOCs at perimeter firewall / proxy'),
    s('out','    2. add IPS signature for beacon pattern'),
    s('out','    3. hunt environment for persistence (run: mitre '+name+')'),
    s('out','    4. ingest IOCs into SIEM (run: ioc '+name+')'),
  ];
}

function cmdMitre(name){
  const m=getSample(name);
  if(!m) return [s('err',`  error: '${name}' not found.`)];
  const entries=Object.entries(m.mitre);
  return [
    s('hi' ,`  [+] MITRE ATT&CK: ${m.family}`),
    s('dim','  ────────────────────────────────────────────────────'),
    ...entries.map(([id,desc])=>s('warn',`  ${id.padEnd(16)} ${desc}`)),
    s('dim','  ────────────────────────────────────────────────────'),
    s('addr',`  https://attack.mitre.org/  (${entries.length} techniques mapped)`),
  ];
}

function run(raw){
  const cmd=raw.trim();
  if(!cmd) return;
  if(cmd!=='history') cmdHistory.push(cmd);
  histIdx=cmdHistory.length;
  const div=document.createElement('div');
  div.className='line';
  div.innerHTML=`<span class="prompt">yoginder@re-lab:~$ </span><span class="cmd">${cmd.replace(/</g,'&lt;')}</span>`;
  screen.appendChild(div);
  screen.scrollTop=screen.scrollHeight;
  const lower=cmd.toLowerCase();
  let lines=[];
  if(lower==='help') lines=COMMANDS.help();
  else if(lower==='whoami') lines=COMMANDS.whoami();
  else if(lower==='projects') lines=COMMANDS.projects();
  else if(lower==='certs') lines=COMMANDS.certs();
  else if(lower==='ls'||lower==='ls samples') lines=COMMANDS['ls samples']();
  else if(lower==='clear'){screen.innerHTML='';return;}
  else if(lower==='history') lines=COMMANDS.history(cmdHistory);
  else if(lower.startsWith('analyze ')) lines=cmdAnalyze(cmd.slice(8).trim());
  else if(lower.startsWith('pe '))      lines=cmdPE(cmd.slice(3).trim());
  else if(lower.startsWith('entropy ')) lines=cmdEntropy(cmd.slice(8).trim());
  else if(lower.startsWith('strings ')) lines=cmdStrings(cmd.slice(8).trim());
  else if(lower.startsWith('disasm '))  lines=cmdDisasm(cmd.slice(7).trim());
  else if(lower.startsWith('yara '))    lines=cmdYara(cmd.slice(5).trim());
  else if(lower.startsWith('c2 '))      lines=cmdC2(cmd.slice(3).trim());
  else if(lower.startsWith('mitre '))   lines=cmdMitre(cmd.slice(6).trim());
  else if(lower.startsWith('ioc '))     lines=cmdIOC(cmd.slice(4).trim());
  else lines=[s('err',`  command not found: ${cmd}`),s('out','  type help for available commands')];
  printLines(lines);
}

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=inp.value;inp.value='';run(v);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(histIdx>0){histIdx--;inp.value=cmdHistory[histIdx];}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(histIdx<cmdHistory.length-1){histIdx++;inp.value=cmdHistory[histIdx];}else{histIdx=cmdHistory.length;inp.value='';}}
});

const boot=[
  s('dim','  ┌──────────────────────────────────────────────────────┐'),

  s('warn','  caution     environment contains simulated malware analysis data'),
  s('out','  tip         use ↑↓ arrows to navigate command history'),
  s('out',''),
  s('out','  type help to begin.'),
  s('out',''),
];
printLines(boot);
